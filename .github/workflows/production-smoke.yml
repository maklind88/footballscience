name: Production Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:postdeploy
        env:
          LIVE_QA_BASE_URL: ${{ vars.LIVE_QA_BASE_URL || 'https://footballscience.xyz' }}
      - run: npx playwright install --with-deps chromium
      - name: Optional authenticated live smoke
        if: ${{ secrets.LIVE_QA_USERNAME != '' && secrets.LIVE_QA_PASSWORD != '' }}
        run: npm run qa:live
        env:
          LIVE_QA_USERNAME: ${{ secrets.LIVE_QA_USERNAME }}
          LIVE_QA_PASSWORD: ${{ secrets.LIVE_QA_PASSWORD }}
          LIVE_QA_BASE_URL: ${{ vars.LIVE_QA_BASE_URL || 'https://footballscience.xyz' }}
