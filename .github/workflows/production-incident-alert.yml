name: Production Incident Alert

on:
  workflow_run:
    workflows:
      - QA
      - Supabase Migrations
      - Production Deploy
      - Production Monitor
      - Production Rollback
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: production-incident-alert-${{ github.event.workflow_run.name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  alert:
    if: ${{ github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.conclusion != 'skipped' && github.event.workflow_run.conclusion != 'neutral' && (github.event.workflow_run.name != 'QA' || github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INCIDENT_ACTOR: ${{ github.event.workflow_run.actor.login }}
      INCIDENT_EVENT: ${{ github.event.workflow_run.event }}
      INCIDENT_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      INCIDENT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      INCIDENT_RUN_ID: ${{ github.event.workflow_run.id }}
      INCIDENT_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
      INCIDENT_RUN_URL: ${{ github.event.workflow_run.html_url }}
      INCIDENT_WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      INCIDENT_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      LIVE_QA_BASE_URL: ${{ vars.LIVE_QA_BASE_URL || 'https://footballscience.xyz' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm run release:incident-alert
