name: Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run qa:supabase
      - name: Check Supabase remote verification config
        id: supabase-remote-env
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        shell: bash
        run: |
          missing=()
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Supabase remote verification skipped::Missing required secret/variable(s): ${missing[*]}. Local migration safety still ran; configure these values to enable remote migration verification."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify remote migration state
        if: ${{ steps.supabase-remote-env.outputs.enabled == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: npm run qa:supabase:remote
